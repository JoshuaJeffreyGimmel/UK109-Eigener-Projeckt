kind: Deployment
apiVersion: apps/v1
metadata:
  name: postgres-db
  labels:
    app: todo-app
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
      tier: database
  template:
    metadata:
      labels:
        app: todo-app
        tier: database
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest # Sicherer OpenShift-Standard-Image
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: "todo_user"
            - name: POSTGRESQL_PASSWORD
              value: "todo_secure_pass" # In Produktion nutzt man hierfür "Secrets"
            - name: POSTGRESQL_DATABASE
              value: "todo_db"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: todo-app
    tier: database
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: todo-app
    tier: database
  type: ClusterIP